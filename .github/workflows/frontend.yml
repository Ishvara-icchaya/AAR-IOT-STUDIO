name: Frontend

on:
  push:
    paths:
      - "services/frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "services/frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: ESLint
        run: npm run lint
      - name: Design drift check
        run: npm run lint:design
